<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPTYMIST Fleet OS</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <h1>OPTYMIST Fleet OS</h1>
        <p>Supabase CRM MVP</p>
      </div>
      <div class="topbar-actions">
        <span id="userEmail" class="muted"></span>
        <button id="logoutBtn" class="hidden">Вийти</button>
      </div>
    </header>

    <div id="msg"></div>

    <section id="authBox" class="card">
      <h2>Вхід</h2>
      <div class="grid2">
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Пароль" />
      </div>
      <div class="actions">
        <button id="signInBtn">Увійти</button>
        <button id="signUpBtn" class="secondary">Зареєструватися</button>
      </div>
    </section>

    <section id="appBox" class="hidden">
      <div class="cards">
        <div class="metric card">
          <div class="label">Водії</div>
          <div id="driversCount" class="value">0</div>
        </div>
        <div class="metric card">
          <div class="label">Авто</div>
          <div id="vehiclesCount" class="value">0</div>
        </div>
        <div class="metric card">
          <div class="label">Розрахунки</div>
          <div id="settlementsCount" class="value">0</div>
        </div>
        <div class="metric card">
          <div class="label">До виплати</div>
          <div id="toPayTotal" class="value">0,00 zł</div>
        </div>
      </div>

      <div class="layout">
        <section class="card">
          <h2>Останні розрахунки</h2>
          <div id="settlementsList"></div>
        </section>

        <section class="card">
          <h2>Водії</h2>
          <div id="driversList"></div>
        </section>

        <section class="card">
          <h2>Авто</h2>
          <div id="vehiclesList"></div>
        </section>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
