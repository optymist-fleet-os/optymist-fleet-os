<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OPTYMIST Fleet OS</title>
  <link rel="stylesheet" href="/styles.css?v=20260424-1" />
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="authView" class="auth-wrap">
    <div class="auth-card">
      <h1>OPTYMIST Fleet OS</h1>
      <p class="muted">Settlement CRM MVP</p>

      <div id="msg"></div>

      <div class="auth-grid">
        <input id="email" type="email" placeholder="Email" autocomplete="email" />
        <input id="password" type="password" placeholder="Пароль" autocomplete="current-password" />
      </div>

      <div class="auth-actions">
        <button id="signInBtn" type="button">Увійти</button>
        <button id="signUpBtn" type="button" class="secondary">Зареєструватися</button>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">OPTYMIST</div>
        <div class="brand-sub">Fleet OS</div>
      </div>

      <nav class="menu">
        <button class="menu-btn active" data-page="dashboard">Dashboard</button>
        <button class="menu-btn" data-page="drivers">Водії</button>
        <button class="menu-btn" data-page="vehicles">Авто</button>
        <button class="menu-btn" data-page="settlements">Розрахунки</button>
      </nav>

      <div class="sidebar-footer">
        <div class="muted small">Settlement CRM MVP</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <div class="muted" id="pageSubtitle">Settlement-first back office</div>
        </div>

        <div class="topbar-actions">
          <span id="userEmail" class="muted"></span>
          <button id="refreshBtn" class="secondary">Оновити</button>
          <button id="logoutBtn">Вийти</button>
        </div>
      </header>

      <div id="appMsg"></div>

      <section id="page-dashboard" class="page"></section>
      <section id="page-drivers" class="page hidden"></section>
      <section id="page-vehicles" class="page hidden"></section>
      <section id="page-settlements" class="page hidden"></section>
    </main>
  </div>

  <script defer src="/app.js?v=20260424-1"></script>
</body>
</html>
