<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OPTYMIST Fleet OS</title>
  <link rel="stylesheet" href="/styles.css?v=20260425-3" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="authView" class="auth-wrap">
    <div class="auth-card">
      <h1>OPTYMIST Fleet OS</h1>
      <p class="muted">Settlement CRM back office</p>

      <div id="msg"></div>

      <div class="auth-grid">
        <input id="email" type="email" placeholder="Email" autocomplete="email" />
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      </div>

      <div class="auth-actions">
        <button id="signInBtn" type="button">Sign in</button>
        <button id="signUpBtn" type="button" class="secondary">Sign up</button>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="brand-title">OPTYMIST</div>
          <div class="brand-sub">Fleet OS</div>
        </div>

        <nav class="menu">
          <button class="menu-btn active" data-page="dashboard">Dashboard</button>
          <button class="menu-btn" data-page="drivers">Drivers</button>
          <button class="menu-btn" data-page="vehicles">Vehicles</button>
          <button class="menu-btn" data-page="owners">Owners</button>
          <button class="menu-btn" data-page="owner-settlements">Owner settlements</button>
          <button class="menu-btn" data-page="settlements">Driver settlements</button>
          <button class="menu-btn" data-page="documents">Documents</button>
        </nav>
      </div>

      <div class="sidebar-footer">
        <div class="muted small">Google Drive ready metadata layer</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <div class="muted" id="pageSubtitle">Fleet finance, operations and document overview</div>
        </div>

        <div class="topbar-actions">
          <span id="userEmail" class="muted"></span>
          <button id="refreshBtn" class="secondary">Refresh</button>
          <button id="logoutBtn">Logout</button>
        </div>
      </header>

      <div id="appMsg"></div>

      <div class="content-grid">
        <div class="content-main">
          <section id="page-dashboard" class="page"></section>
          <section id="page-drivers" class="page hidden"></section>
          <section id="page-vehicles" class="page hidden"></section>
          <section id="page-owners" class="page hidden"></section>
          <section id="page-owner-settlements" class="page hidden"></section>
          <section id="page-settlements" class="page hidden"></section>
          <section id="page-documents" class="page hidden"></section>
        </div>

        <aside id="detailsPanel" class="details-panel hidden">
          <div class="details-card">
            <div class="details-header">
              <div>
                <div id="detailsKicker" class="muted small">Details</div>
                <h3 id="detailsTitle">Select a row</h3>
              </div>
              <button id="closeDetailsBtn" class="secondary" type="button">Close</button>
            </div>
            <div id="detailsBody"></div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script type="module" src="/js/main.js?v=20260425-3"></script>
</body>
</html>
